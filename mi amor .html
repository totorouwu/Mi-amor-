<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para el amor de mi vida ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(#F5E8DC, #ffe4ec);
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: #5C4033;
    overflow: hidden;
}

/* Texto */
.mensaje {
    margin-top: 30px;
    font-size: 22px;
}

/* Árbol */
.tree {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 40px auto;
}

/* Corazones */
.heart {
    position: absolute;
    width: 12px;
    height: 12px;
    background: red;
    transform: rotate(45deg);
    animation: latido 1.5s infinite;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    background: inherit;
    border-radius: 50%;
}

.heart::before { top: -6px; }
.heart::after { left: -6px; }

@keyframes latido {
    0%, 100% { transform: scale(1) rotate(45deg); }
    50% { transform: scale(1.3) rotate(45deg); }
}

/* Tronco */
.trunk {
    width: 20px;
    height: 100px;
    background: #2E8B57;
    margin: -20px auto;
}

/* Contador */
#contador {
    margin-top: 20px;
    font-size: 20px;
}

/* Corazones flotando */
.floating-heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎵 Música -->
<audio autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b1e4c9c0f.mp3?filename=romantic-piano-110997.mp3" type="audio/mpeg">
</audio>

<div class="mensaje">
    <p><strong>Para el amor de mi vida ❤️</strong></p>
    <p>Si pudiera elegir un lugar...</p>
    <p>Siempre sería a tu lado 💕</p>
</div>

<div class="tree" id="tree"></div>
<div class="trunk"></div>

<div id="contador"></div>

<script>
// 🌳 Árbol de corazones
const tree = document.getElementById("tree");

for (let i = 0; i < 120; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";

    let t = Math.random() * Math.PI * 2;
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

    heart.style.left = (150 + x * 6) + "px";
    heart.style.top = (120 + y * 6) + "px";
    heart.style.background = `hsl(${Math.random()*360}, 80%, 70%)`;

    tree.appendChild(heart);
}

// 💕 Corazones flotando
function crearCorazon() {
    let heart = document.createElement("div");
    heart.className = "floating-heart";
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(crearCorazon, 300);

// ⏳ Contador
let fechaInicio = new Date("2024-07-18T00:00:00");

function actualizarContador() {
    let ahora = new Date();
    let diff = ahora - fechaInicio;

    let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    let horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
    let minutos = Math.floor((diff / (1000 * 60)) % 60);
    let segundos = Math.floor((diff / 1000) % 60);

    document.getElementById("contador").innerHTML =
        `Nuestro amor comenzó el 18 de julio del 2024 💖<br><br>
        Llevamos juntos:<br>
        <strong>${dias} días ${horas} horas ${minutos} minutos ${segundos} segundos</strong>`;
}

setInterval(actualizarContador, 1000);
</script>

</body>
</html>
